<!DOCTYPE html>
<html>

<head>

  <title>Rock Paper Scissors</title>
  
<link rel="stylesheet" href="styles/12r-rock-paper-scissors.css">
  
  </head>
</head>
<body>
  <p class="title">Rock Paper Scissors</p>
  <button class="move-button js-rock-button"><img src="rock-emoji.jpeg"class="move-icon"></button>
  <button class="move-button js-paper-button"
  ><img src="paper-emoji.jpeg"class="move-icon"></button>
  <button class="move-button js-scissors-button"
  ><img src="scissors-emoji.jpeg" class="move-icon"></button>
  
  <p class="js-result result"></p>
  <p class="js-moves">You<img src="rock-emoji.jpeg" class="move-icon">
  <img src="scissors-emoji.jpeg"class="move-icon">Computer</p>
  <p class="js-score score"></p>
  
  <button class="js-reset-score reset-score-button">Reset Score</button>
  <button class="js-autoplay autoplay-button">Auto play</button>
  <p class="reset-confirmation"></p>
  <script src="scripts/12r-rock-paper-scissors.js"></script>
 
  
  
  
</body>

</html>
